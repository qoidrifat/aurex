# ─── AUREX Staging — Nginx Reverse Proxy ─────────────
# Melayani Laravel API + AI Service di balik domain yang sama.
#
# Laravel  : http://laravel:80     → /
# AI       : http://ai-service:8001 → /ai/
# Horizon  : http://laravel:80     → /horizon (via Laravel)
# Pulse    : http://laravel:80     → /pulse   (via Laravel)

upstream laravel {
    server laravel:80;
}

upstream ai_service {
    server ai-service:8001;
}

server {
    listen 80;
    server_name staging-api.aurex.app;

    # Redirect root ke dokumentasi API
    location = / {
        return 301 /api/v1/health;
    }

    # ── Laravel API ──────────────────────────────────
    location /api/ {
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Stream file upload yang besar
        client_max_body_size 20M;
        proxy_request_buffering off;
    }

    # ── Laravel Static Assets ────────────────────────
    location /storage/ {
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Laravel Pulse ────────────────────────────────
    location /pulse {
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Laravel Horizon ──────────────────────────────
    location /horizon {
        proxy_pass http://laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── AI Service ───────────────────────────────────
    location /ai/ {
        rewrite ^/ai/(.*) /$1 break;
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # ── Security Headers ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
