version: '3.8'

name: aurex-staging

# ==================== NETWORKS ====================
networks:
  aurex-network:
    driver: bridge

# ==================== VOLUMES ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  laravel-logs:
    driver: local

# ==================== SERVICES ====================
services:

  # ----- REVERSE PROXY (Nginx) -----
  nginx:
    image: nginx:1.27-alpine
    container_name: aurex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel
      - ai-service
    networks:
      - aurex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----- LARAVEL BACKEND -----
  laravel:
    build:
      context: ./backend/laravel_api
      dockerfile: Dockerfile
    container_name: aurex-laravel
    expose:
      - "80"
    volumes:
      - laravel-logs:/var/www/html/storage/logs
    environment:
      # ── App Config ──
      - APP_ENV=staging
      - APP_DEBUG=false
      - APP_URL=https://staging-api.aurex.app

      # ── Database ──
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=aurex_staging
      - DB_USERNAME=aurex_user
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}

      # ── Cache / Session / Queue ──
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

      # ── Auth ──
      - APP_KEY=${APP_KEY:?APP_KEY is required! Generate: php artisan key:generate --show}

      # ── AI Service ──
      - AI_SERVICE_URL=http://ai-service:8001/analyze-face
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:?AI_SERVICE_API_KEY is required}

      # ── Sentry (Error Tracking) ──
      - SENTRY_LARAVEL_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=0.1

      # ── Monitoring ──
      - PULSE_ENABLED=true
      - PULSE_DB_CONNECTION=mysql
      - HORIZON_DOMAIN=
      - HORIZON_PATH=horizon

      # ── Health Monitor Alerting ──
      - HEALTH_ALERT_SLACK_ENABLED=${HEALTH_ALERT_SLACK_ENABLED:-false}
      - HEALTH_ALERT_MAIL_ENABLED=${HEALTH_ALERT_MAIL_ENABLED:-true}
      - HEALTH_ALERT_FAILURE_THRESHOLD=3
      - HEALTH_ALERT_RECOVERY_THRESHOLD=2
      - HEALTH_ALERT_MAIL_RECIPIENTS=${HEALTH_ALERT_MAIL_RECIPIENTS:-}
      - SLACK_BOT_USER_OAUTH_TOKEN=${SLACK_BOT_USER_OAUTH_TOKEN:-}
      - SLACK_BOT_USER_DEFAULT_CHANNEL=${SLACK_BOT_USER_DEFAULT_CHANNEL:-}

      # ── Mail ──
      - MAIL_MAILER=log
      - MAIL_FROM_ADDRESS=hello@aurex.app
      - MAIL_FROM_NAME="AUREX Staging"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aurex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "/var/www/html/artisan", "health:check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----- LARAVEL HORIZON (Queue Worker) -----
  horizon:
    build:
      context: ./backend/laravel_api
      dockerfile: Dockerfile
    container_name: aurex-horizon
    command: php /var/www/html/artisan horizon
    volumes:
      - laravel-logs:/var/www/html/storage/logs
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=aurex_staging
      - DB_USERNAME=aurex_user
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - APP_KEY=${APP_KEY:?APP_KEY is required}
      - AI_SERVICE_URL=http://ai-service:8001/analyze-face
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:?AI_SERVICE_API_KEY is required}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aurex-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ----- MYSQL DATABASE -----
  mysql:
    image: mysql:8.4
    container_name: aurex-mysql
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=aurex_staging
      - MYSQL_USER=aurex_user
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=64M
      - --innodb_log_file_size=256M
    networks:
      - aurex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----- REDIS (Cache / Session / Queue) -----
  redis:
    image: redis:7.4-alpine
    container_name: aurex-redis
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - aurex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ----- AI SERVICE (Python FastAPI) -----
  ai-service:
    build:
      context: ./ai_service/python_ai
      dockerfile: Dockerfile
    container_name: aurex-ai-service
    expose:
      - "8001"
    environment:
      - AI_SERVICE_PORT=8001
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:?AI_SERVICE_API_KEY is required}
      - PYTHONUNBUFFERED=1
    networks:
      - aurex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
