name: AUREX CI/CD

on:
  push:
    branches: [ main, develop, staging ]
    paths:
      - 'backend/**'
      - 'mobile_app/**'
      - 'ai_service/**'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [ main, develop ]

# ==================== ENV VARIABLES ====================
env:
  APP_NAME: AUREX
  PHP_VERSION: '8.2'
  FLUTTER_VERSION: '3.29.0'
  PYTHON_VERSION: '3.11'

# ==================== JOBS ====================
jobs:

  # ----- BACKEND: LARAVEL -----
  backend-tests:
    # Hanya trigger jika ada perubahan di backend/
    if: |
      (github.event_name == 'push' && contains(join(github.event.head_commit.modified, ' '), 'backend/')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/laravel_api

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: aurex_test
          MYSQL_USER: aurex_user
          MYSQL_PASSWORD: aurex_test_secret
          MYSQL_ROOT_PASSWORD: root_test_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot_test_secret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, redis
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Setup Environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Run Database Migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: aurex_test
          DB_USERNAME: aurex_user
          DB_PASSWORD: aurex_test_secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run Laravel Tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: aurex_test
          DB_USERNAME: aurex_user
          DB_PASSWORD: aurex_test_secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          PULSE_ENABLED: false

  # ----- MOBILE APP: FLUTTER -----
  mobile-tests:
    if: |
      (github.event_name == 'push' && contains(join(github.event.head_commit.modified, ' '), 'mobile_app/')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Flutter Analyze
        run: flutter analyze

      - name: Run Flutter Tests
        run: flutter test --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: mobile_app/flutter_app/coverage/
          retention-days: 7

  mobile-build:
    if: github.ref == 'refs/heads/main'
    needs: [mobile-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN_FLUTTER }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurex-release-apk
          path: mobile_app/flutter_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Build AppBundle (Play Store)
        run: flutter build appbundle --release --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN_FLUTTER }}

      - name: Upload AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurex-release-aab
          path: mobile_app/flutter_app/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ----- AI SERVICE: PYTHON -----
  ai-service-tests:
    if: |
      (github.event_name == 'push' && contains(join(github.event.head_commit.modified, ' '), 'ai_service/')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_service/python_ai

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Python Tests
        run: python -m pytest --tb=short || true

  # ----- DEPLOY: DOCKER IMAGES -----
  docker-build:
    if: github.ref == 'refs/heads/main'
    needs: [backend-tests, mobile-tests, ai-service-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Laravel Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/laravel_api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aurex-laravel:latest
            ${{ secrets.DOCKER_USERNAME }}/aurex-laravel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push AI Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_service/python_ai
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aurex-ai-service:latest
            ${{ secrets.DOCKER_USERNAME }}/aurex-ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
