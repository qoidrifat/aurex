services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: aurex
      MYSQL_USER: aurex
      MYSQL_PASSWORD: aurex
      MYSQL_ROOT_PASSWORD: aurex_root
    ports:
      - "3306:3306"
    volumes:
      - aurex-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uaurex", "-paurex"]
      interval: 10s
      timeout: 5s
      retries: 6

  ai:
    build:
      context: ./ai-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  aurex-mysql:
