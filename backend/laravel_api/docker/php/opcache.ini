[opcache]
; Aktivasi OPcache untuk produksi
opcache.enable = 1
opcache.enable_cli = 1

; Memory allocation
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000

; Production: jangan validate timestamps (cache sampai next deploy)
; Saat deploy: restart PHP-FPM atau gunakan opcache_reset()
opcache.validate_timestamps = 0

; Optimization
opcache.fast_shutdown = 1
opcache.revalidate_freq = 0
opcache.max_wasted_percentage = 10

; JIT Compiler (PHP 8.0+) — improves CPU-heavy operations
opcache.jit = tracing
opcache.jit_buffer_size = 100M
opcache.jit_max_trace_length = 128
